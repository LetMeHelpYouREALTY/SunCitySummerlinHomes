# Renamed from Grunt template: this repo is Next.js only (no Gruntfile).
# Keeps CI on push/PR aligned with Vercel’s install + next build.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install and build
        run: |
          npm install
          npm run build
